# =========================
# Baseline B1
# 3FAP-only conditioned generation
# + 7PQV post hoc screening
# =========================

target_path: receptors
docking_num: 12
score_target: "SCORE.INTER"
base_vinadock_score: -9.0

save_every_minutes: 2
simulation_num: 4

target: 3fap-only-B1-postscreen-7pqv
trial: 2101
target_total_mols: 1889
hours_per_seed: 25

prior_temperature: 1.03
prior_top_k: 28
prior_top_p: 0.90
prior_dirichlet_alpha: 0.42
prior_dirichlet_eps: 0.06

skip_dock_if_duplicate: true

mcts:
  c_val: 1.30
  expanded_k: 48
  sim_num: 4

prefilter:
  qed_min: 0.32
  sa_max: 5.5
  dock_max_per_rollout: 12
  lipinski_max_viol: 1
  lip_max_viol: 1

reward:
  w_docking: 0.90
  w_qed: 0.07
  w_sa: 0.03
  w_lip_penalty: 0.00
  w_dock: 0.90
  w_lip: 0.00

# ===== prior =====
prior_enable: true
prior_mode: single_1
prior_url: http://127.0.0.1:26974/prior

# Use only the 3FAP prior for generation
prior_protein_path_1: receptors/3fap.pkl
prior_protein_path_2: receptors/7pqv.pkl

# ===== seed =====
seed_enable: false
seed_fragment_mode: prefer
seed_fragment_prefer_sp3: false
seed_max_num: 4
seed_scaffolds_no_star_override: []
seed_scaffolds_override: []
seed_scaffolds_smarts_override: []

# ===== checks =====
radical_check: true
hashimoto_filter: true
SMOKE_BYPASS_RADICAL: false
SMOKE_BYPASS_HASHIMOTO: false

# ===== outputs =====
output: outputs/result_B1_3fap_only_postscreen_7pqv.csv
seedmap: outputs/seedmap_B1_3fap_only_postscreen_7pqv.csv
debug_log: logs/debug_B1_3fap_only_postscreen_7pqv.log

# ===== docking combine =====
dock_combine_mode: balanced_dual
dock_k_sum: 0.10
dock_k_worst: 0.12
dock_k_imbalance: 0.10
dock_w_sum: 0.50
dock_w_worst: 0.60
dock_w_imbalance: 0.20

base_vina_3fap: -9.0
base_vina_7pqv: -9.0