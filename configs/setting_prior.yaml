# =========================
# Formal prior-guided population set
# PSGS-Drug public configuration record
# =========================

target: 3fap-7pqv-prior
target_path: receptors

# Baseline score used for dual-target reward normalization
base_vinadock_score: -7.0

# Generation settings
trial: 1
target_total_mols: 1889
loop_num_nodeExpansion: 82
simulation_num: 4
sa_threshold: 5
rule5: 1
radical_check: true
hashimoto_filter: true
model_name: "model"

# Token-Mol pocket-prior service
prior_url: http://127.0.0.1:26974/prior
prior_protein_path_1: receptors/3fap.pkl
prior_protein_path_2: receptors/7pqv.pkl

# MCTS settings
mcts:
  expanded_k: 24
  c_val: 1.3
  hours: 12
  diversity_bonus: 0.05

# Docking settings
docking_num: 12
score_target: "SCORE.INTER"

# Reward weights
reward:
  w_docking: 0.70
  w_qed: 0.20
  w_sa: 0.10

# Output file for the formal prior-guided population set
output: outputs/Prior-guided population set.csv
